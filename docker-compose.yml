services:
  db:
    image: postgres:15-alpine
    container_name: dret_postgres_db
    env_file:
      - ./backend/.env
    volumes:
      - dret_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: dret_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./lovable-frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: dret_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  admin_frontend:
    build:
      context: ./admin-frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_BASE_PATH=${VITE_BASE_PATH:-/}
    container_name: dret_admin_frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  dret_postgres_data:
