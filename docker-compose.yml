services:
  db:
    image: postgres:15-alpine
    container_name: canadaeta_postgres_db
    env_file:
      - ./backend/.env
    volumes:
      - canadaeta_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: canadaeta_backend
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./lovable-frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: canadaeta_frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  admin_frontend:
    build:
      context: ./admin-frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_BASE_PATH=${VITE_BASE_PATH:-/}
        - VITE_PAY_EMAIL=${VITE_PAY_EMAIL:-}
        - VITE_PAY_PHONE=${VITE_PAY_PHONE:-}
        - VITE_PAY_CARDHOLDER=${VITE_PAY_CARDHOLDER:-}
        - VITE_PAY_CARD_NUMBER=${VITE_PAY_CARD_NUMBER:-}
        - VITE_PAY_CARD_EXPIRY=${VITE_PAY_CARD_EXPIRY:-}
        - VITE_PAY_CARD_CVV=${VITE_PAY_CARD_CVV:-}
        - VITE_PAY_ADDRESS1=${VITE_PAY_ADDRESS1:-}
        - VITE_PAY_ADDRESS2=${VITE_PAY_ADDRESS2:-}
        - VITE_PAY_CITY=${VITE_PAY_CITY:-}
        - VITE_PAY_COUNTRY=${VITE_PAY_COUNTRY:-}
        - VITE_PAY_PROVINCE=${VITE_PAY_PROVINCE:-}
        - VITE_PAY_POSTAL=${VITE_PAY_POSTAL:-}
    container_name: canadaeta_admin_frontend
    ports:
      - "127.0.0.1:3001:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  canadaeta_postgres_data:
